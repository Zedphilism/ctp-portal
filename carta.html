<!doctype html>
<html lang="ms">
<head>
  <meta charset="utf-8" />
  <script src="assets/theme-rotator.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Carta Alir Sel Teknikal | CT&amp;P</title>
  <meta name="description" content="Paparan carta alir asal Sel Teknikal daripada SOP PDF." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@500;700;800&display=swap" rel="stylesheet" />
  <style>
    :root{
      --bg:#072b1d;
      --panel:#0c3a28;
      --panel2:#0a3222;
      --soft:rgba(255,255,255,.04);
      --text:#f5fff6;
      --muted:#bfd8c6;
      --line:rgba(224,255,232,.14);
      --shadow:0 24px 70px rgba(0,0,0,.32);
      --tech:#1ba05a;
      --gold:#d7a447;
      --paper:#ffffff;
      --paper-shadow:0 22px 50px rgba(0,0,0,.22);
    }

    body.theme-light{
      --bg:#f5fbf1;
      --panel:#ffffff;
      --panel2:#edf7eb;
      --soft:rgba(20,79,49,.045);
      --text:#153625;
      --muted:#5b7665;
      --line:rgba(18,79,48,.12);
      --shadow:0 20px 52px rgba(16,63,38,.12);
      --tech:#148b4f;
      --gold:#bf8a2d;
      --paper:#ffffff;
      --paper-shadow:0 16px 36px rgba(20,64,39,.12);
    }

    *{ box-sizing:border-box; }
    html, body{ height:100%; }
    body{
      margin:0;
      font-family:"Inter", system-ui, sans-serif;
      color:var(--text);
      background:
        radial-gradient(920px 560px at 18% 8%, rgba(50,161,92,.18), transparent 60%),
        radial-gradient(860px 540px at 82% 18%, rgba(215,164,71,.16), transparent 52%),
        var(--bg);
    }
    body::before{
      content:"";
      position:fixed;
      inset:-40px;
      pointer-events:none;
      background:radial-gradient(closest-side at 50% 42%, rgba(0,0,0,0) 55%, rgba(0,0,0,.24) 100%);
    }
    body.theme-light::before{
      background:radial-gradient(closest-side at 50% 45%, rgba(255,255,255,0) 62%, rgba(20,64,39,.08) 100%);
    }

    a{ color:inherit; }

    .theme-fab{ position:fixed; top:18px; left:18px; z-index:40; }
    .theme-switch{ border:0; padding:0; background:transparent; cursor:pointer; line-height:0; }
    .theme-track{
      position:relative;
      width:86px;
      height:40px;
      border-radius:999px;
      display:block;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.12);
      background:linear-gradient(165deg, #7d848e, #4c525d);
      box-shadow:inset 0 2px 2px rgba(255,255,255,.14), inset 0 -6px 12px rgba(0,0,0,.35), 0 7px 14px rgba(0,0,0,.25);
    }
    .theme-track::before{
      content:"";
      position:absolute;
      inset:3px;
      border-radius:999px;
      background:linear-gradient(180deg, #757d88, #5a616d);
      z-index:1;
    }
    .theme-thumb{
      position:absolute;
      top:4px;
      left:4px;
      width:37px;
      height:32px;
      border-radius:999px;
      z-index:2;
      background:linear-gradient(180deg, #8b929d, #5c6470);
      box-shadow:inset 0 1px 1px rgba(255,255,255,.25), 0 4px 8px rgba(0,0,0,.3);
      transition:left .28s ease;
    }
    .theme-icon{
      position:absolute;
      top:50%;
      transform:translateY(-50%);
      width:16px;
      height:16px;
      color:rgba(255,255,255,.5);
      z-index:3;
    }
    .theme-icon svg{
      width:100%;
      height:100%;
      fill:currentColor;
    }
    .theme-icon-sun{ left:12px; }
    .theme-icon-moon{ right:12px; }
    body.theme-light .theme-thumb{ left:4px; }
    body.theme-dark .theme-thumb{ left:45px; }
    body.theme-light .theme-icon-sun{ color:#ffffff; }
    body.theme-dark .theme-icon-moon{ color:#e7fff0; }
    .theme-switch:focus-visible .theme-track{
      outline:2px solid var(--tech);
      outline-offset:2px;
    }

    .wrap{
      position:relative;
      z-index:1;
      width:min(1260px, calc(100% - 28px));
      margin:0 auto;
      padding:86px 0 42px;
    }

    .shell,
    .workflow{
      border:1px solid var(--line);
      border-radius:24px;
      background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.015));
      box-shadow:var(--shadow);
      backdrop-filter:blur(12px);
    }

    .shell{
      padding:18px;
      display:grid;
      gap:16px;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      flex-wrap:wrap;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
      flex-wrap:wrap;
    }

    .logos{
      display:flex;
      gap:10px;
      flex:0 0 auto;
    }

    .logos img{
      width:46px;
      height:46px;
      object-fit:contain;
      border-radius:14px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.05);
      padding:7px;
    }

    .title-wrap{ min-width:0; }
    .eyebrow{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:7px 12px;
      border-radius:999px;
      border:1px solid rgba(215,164,71,.28);
      background:rgba(215,164,71,.16);
      font-size:11px;
      font-weight:900;
      letter-spacing:.12em;
      text-transform:uppercase;
      margin-bottom:10px;
    }

    h1, h2{
      margin:0;
      font-family:"Space Grotesk", "Inter", sans-serif;
    }

    h1{
      font-size:clamp(1.8rem, 2.8vw, 2.8rem);
      line-height:1.05;
    }

    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }

    .btn,
    .quick-link{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      padding:11px 16px;
      border-radius:999px;
      border:1px solid var(--line);
      background:var(--soft);
      text-decoration:none;
      font-weight:800;
      transition:.18s ease;
    }
    .btn:hover,
    .quick-link:hover{
      transform:translateY(-1px);
      border-color:rgba(27,160,90,.34);
      background:rgba(27,160,90,.12);
    }

    .quick-nav{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
    }

    .workflow-list{
      margin-top:20px;
      display:grid;
      gap:18px;
    }

    .workflow{
      padding:16px;
      scroll-margin-top:100px;
    }

    .workflow-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:14px;
      flex-wrap:wrap;
    }

    .workflow-tag{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:7px 12px;
      border-radius:999px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.04);
      font-size:11px;
      font-weight:900;
      letter-spacing:.12em;
      text-transform:uppercase;
    }

    .page-stack{
      display:grid;
      gap:18px;
    }

    .page-frame{
      border-radius:22px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.04);
      padding:14px;
    }

    .page-paper{
      width:100%;
      border-radius:14px;
      overflow:hidden;
      background:var(--paper);
      box-shadow:var(--paper-shadow);
    }

    .page-paper canvas{
      display:block;
      width:100%;
      height:auto;
      background:#ffffff;
    }

    .loading,
    .error{
      padding:18px;
      text-align:center;
      font-weight:700;
      color:var(--muted);
    }

    .error{ color:#ffb3b3; }

    @media (max-width: 760px){
      .wrap{ width:min(100% - 20px, 1260px); padding-top:80px; }
      .shell,
      .workflow{ padding:14px; }
      .theme-fab{ top:12px; left:12px; }
      .topbar{ align-items:flex-start; }
    }
  </style>
</head>
<body class="theme-dark">
  <div class="theme-fab">
    <button class="theme-switch" id="themeSwitch" type="button" aria-label="Toggle light and dark theme" title="Switch theme">
      <span class="theme-track">
        <span class="theme-thumb"></span>
        <span class="theme-icon theme-icon-sun" aria-hidden="true">
          <svg viewBox="0 0 24 24" role="presentation">
            <path d="M12 7a5 5 0 1 0 0 10 5 5 0 0 0 0-10zm0-5a1 1 0 0 1 1 1v2a1 1 0 1 1-2 0V3a1 1 0 0 1 1-1zm0 16a1 1 0 0 1 1 1v2a1 1 0 1 1-2 0v-2a1 1 0 0 1 1-1zm10-6a1 1 0 0 1-1 1h-2a1 1 0 1 1 0-2h2a1 1 0 0 1 1 1zM7 12a1 1 0 0 1-1 1H4a1 1 0 1 1 0-2h2a1 1 0 0 1 1 1zm11.07-6.66a1 1 0 0 1 0 1.42l-1.41 1.41a1 1 0 1 1-1.42-1.41l1.42-1.42a1 1 0 0 1 1.41 0zM8.76 15.24a1 1 0 0 1 0 1.41l-1.42 1.42a1 1 0 0 1-1.41-1.42l1.41-1.41a1 1 0 0 1 1.42 0zm0-8.48a1 1 0 0 1-1.42 0L5.93 5.34a1 1 0 0 1 1.41-1.41l1.42 1.41a1 1 0 0 1 0 1.42zm8.49 8.48 1.41 1.41a1 1 0 1 1-1.41 1.42l-1.42-1.42a1 1 0 1 1 1.42-1.41z"></path>
          </svg>
        </span>
        <span class="theme-icon theme-icon-moon" aria-hidden="true">
          <svg viewBox="0 0 24 24" role="presentation">
            <path d="M20.71 14.29A9 9 0 0 1 9.71 3.29a1 1 0 0 0-1.24-1.24A11 11 0 1 0 22 15.53a1 1 0 0 0-1.29-1.24z"></path>
          </svg>
        </span>
      </span>
    </button>
  </div>

  <main class="wrap">
    <section class="shell">
      <div class="topbar">
        <div class="brand">
          <div class="logos" aria-hidden="true">
            <img src="assets/icon1.png" alt="" />
            <img src="assets/icon2.png" alt="" />
          </div>
          <div class="title-wrap">
            <div class="eyebrow">Sel Teknikal</div>
            <h1>Carta Alir Asal</h1>
          </div>
        </div>
        <div class="actions">
          <a class="btn" href="index.html">Kembali</a>
          <a class="btn" href="assets/docs/sel-teknikal-workflows.pdf" target="_blank" rel="noopener">Buka PDF</a>
        </div>
      </div>

      <nav class="quick-nav" aria-label="Pilih workflow">
        <a class="quick-link" href="#fat">FAT</a>
        <a class="quick-link" href="#dokumen">Mewujudkan Dokumen</a>
        <a class="quick-link" href="#bekalan">Bekalan Teknikal</a>
      </nav>
    </section>

    <section class="workflow-list">
      <section class="workflow" id="fat">
        <div class="workflow-head">
          <h2>FAT (Final Acceptance Test)</h2>
          <span class="workflow-tag">Halaman 2 - 4</span>
        </div>
        <div class="page-stack" data-pages="2,3,4"></div>
      </section>

      <section class="workflow" id="dokumen">
        <div class="workflow-head">
          <h2>Mewujudkan Dokumen</h2>
          <span class="workflow-tag">Halaman 5 - 7</span>
        </div>
        <div class="page-stack" data-pages="5,6,7"></div>
      </section>

      <section class="workflow" id="bekalan">
        <div class="workflow-head">
          <h2>Bekalan Teknikal</h2>
          <span class="workflow-tag">Halaman 8 - 10</span>
        </div>
        <div class="page-stack" data-pages="8,9,10"></div>
      </section>
    </section>
  </main>

  <script type="module">
    import * as pdfjsLib from "./assets/vendor/pdfjs/pdf.mjs";

    const THEME_KEY = "ctp_theme";
    const themeSwitch = document.getElementById("themeSwitch");
    const PAGE_STACKS = Array.from(document.querySelectorAll(".page-stack"));
    const PDF_URL = "./assets/docs/sel-teknikal-workflows.pdf";
    let pdfDoc = null;

    pdfjsLib.GlobalWorkerOptions.workerSrc = "./assets/vendor/pdfjs/pdf.worker.mjs";

    function normalizeTheme(theme){
      return theme === "light" || theme === "lightB" ? "light" : "dark";
    }

    function applyTheme(theme){
      const mode = normalizeTheme(theme);
      document.body.classList.toggle("theme-light", mode === "light");
      document.body.classList.toggle("theme-dark", mode === "dark");
      if(themeSwitch){
        themeSwitch.setAttribute("aria-pressed", mode === "dark" ? "true" : "false");
      }
    }

    (function initTheme(){
      let stored = "";
      try{ stored = localStorage.getItem(THEME_KEY) || ""; }catch(e){}
      applyTheme(stored || "dark");
      if(themeSwitch){
        themeSwitch.addEventListener("click", () => {
          const next = document.body.classList.contains("theme-dark") ? "light" : "dark";
          applyTheme(next);
          try{ localStorage.setItem(THEME_KEY, next); }catch(e){}
        });
      }
    })();

    function setLoading(container, label){
      container.innerHTML = `
        <div class="page-frame">
          <div class="page-paper">
            <div class="loading">${label}</div>
          </div>
        </div>
      `;
    }

    function setError(container, message){
      container.innerHTML = `
        <div class="page-frame">
          <div class="page-paper">
            <div class="error">${message}</div>
          </div>
        </div>
      `;
    }

    async function renderPageInto(container, pageNumber){
      const page = await pdfDoc.getPage(pageNumber);
      const frame = document.createElement("div");
      frame.className = "page-frame";

      const paper = document.createElement("div");
      paper.className = "page-paper";

      const canvas = document.createElement("canvas");
      const context = canvas.getContext("2d");

      const baseViewport = page.getViewport({ scale: 1 });
      const maxWidth = Math.min(container.clientWidth || 980, 980);
      const scale = maxWidth / baseViewport.width;
      const viewport = page.getViewport({ scale });
      const outputScale = window.devicePixelRatio || 1;

      canvas.width = Math.floor(viewport.width * outputScale);
      canvas.height = Math.floor(viewport.height * outputScale);
      canvas.style.width = `${Math.floor(viewport.width)}px`;
      canvas.style.height = `${Math.floor(viewport.height)}px`;

      context.setTransform(outputScale, 0, 0, outputScale, 0, 0);
      await page.render({ canvasContext: context, viewport }).promise;

      paper.appendChild(canvas);
      frame.appendChild(paper);
      container.appendChild(frame);
    }

    async function renderStack(container){
      const pages = String(container.dataset.pages || "")
        .split(",")
        .map(x => Number(x.trim()))
        .filter(Boolean);

      setLoading(container, "Memuatkan carta...");
      container.innerHTML = "";

      for(const pageNumber of pages){
        await renderPageInto(container, pageNumber);
      }
    }

    async function renderAll(){
      if(!pdfDoc) return;
      for(const container of PAGE_STACKS){
        await renderStack(container);
      }
    }

    let resizeTimer = null;
    window.addEventListener("resize", () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => {
        renderAll().catch(() => {});
      }, 180);
    });

    async function initPdf(){
      PAGE_STACKS.forEach((container) => setLoading(container, "Memuatkan carta..."));
      try{
        pdfDoc = await pdfjsLib.getDocument(PDF_URL).promise;
        await renderAll();
      }catch(err){
        PAGE_STACKS.forEach((container) => {
          setError(container, "Gagal memuatkan PDF.");
        });
        console.error(err);
      }
    }

    initPdf();
  </script>
</body>
</html>
